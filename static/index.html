<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>招聘管理工具</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="logo">招聘管理</div>
      <nav>
        <a href="#/" class="nav-item" data-page="dashboard">首页</a>
        <a href="#/pipeline" class="nav-item" data-page="pipeline">进行中</a>
        <a href="#/hired" class="nav-item" data-page="hired">已入职</a>
        <a href="#/talent" class="nav-item" data-page="talent">人才库</a>
        <a href="#/jobs" class="nav-item" data-page="jobs">岗位库</a>
        <a href="#/analytics" class="nav-item" data-page="analytics">数据分析</a>
        <a href="#/settings" class="nav-item" data-page="settings">设置</a>
      </nav>
    </aside>
    <main class="main-content">
      <div id="warning-banner" class="warning-banner hidden">
        AI 未配置 — 请在 <code>config.json</code> 中填入 API Key 后重启应用，简历自动解析功能暂不可用。
      </div>
      <div id="page-content"></div>
    </main>
  </div>

  <!-- 简历确认弹窗 -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="margin:0">确认候选人信息</h2>
        <button id="modal-cancel" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999;line-height:1">×</button>
      </div>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-save" class="btn btn-primary">保存候选人</button>
      </div>
    </div>
  </div>

  <div id="dedup-overlay" class="modal-overlay hidden" style="align-items:flex-start;padding:24px;overflow-y:auto">
    <div class="modal" style="max-width:800px;width:100%;max-height:90vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="margin:0">候选人查重</h2>
        <button id="dedup-close" class="btn btn-secondary" style="padding:4px 12px">×</button>
      </div>
      <div id="dedup-content"><span class="spinner"></span></div>
    </div>
  </div>

  <!-- 通用弹窗容器 -->
  <div id="dialog-overlay" class="dialog-overlay hidden">
    <div class="dialog">
      <div class="dialog-header">
        <h3 id="dialog-title"></h3>
        <button class="dialog-close" id="dialog-close-btn">&times;</button>
      </div>
      <div class="dialog-body" id="dialog-body"></div>
      <div class="dialog-footer" id="dialog-footer"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script type="module">
    import { api, showToast, withLoading } from "/static/lib/api.js";
    import { formatTime, formatDate, formatStage } from "/static/lib/helpers.js";
    // Expose to window so non-module scripts and inline handlers can use them
    Object.assign(window, { api, showToast, withLoading, formatTime, formatDate, formatStage });
  </script>
</body>
</html>
